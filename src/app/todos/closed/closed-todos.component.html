<p>Todos count: {{ todosCount() }}</p>

<ul>
  @for (todo of todos(); track $index) {
    <li>
      {{ todo.todoName }}
      {{ todo.dateCompleted | date: "yy M dd hh mm SS" }}
      {{ null | yesNo }}
      {{ undefined | yesNo }}
      {{ "bla bla" | yesNo }}
    </li>
  } @empty {
    <li>No todos available.</li>
  }
</ul>
