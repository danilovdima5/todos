<p *ngIf="tasks().length === 0">No tasks for now!</p>

<ul *ngIf="tasks().length > 0">
  <li *ngFor="let task of tasks()">
    {{ task.taskName }}
    {{ task.dateCreated | date : 'yy M dd hh mm SS' }}
    {{ null | yesNo }}
    {{ undefined | yesNo }}
    {{ 'bla bla' | yesNo }}
    <button (click)="removeTask(task)">Remove</button>
  </li>
</ul>
